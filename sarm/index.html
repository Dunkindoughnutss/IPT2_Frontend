<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SARM — Student Academic Record Management</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── Login ─────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🎓</div>
      <div class="login-logo-text">SARM</div>
      <div class="login-logo-sub">Student Academic Record Management</div>
      <div class="login-logo-org">University of Eastern Philippines · College of Science</div>
    </div>

    <div id="login-error" class="alert alert-danger hidden"></div>

    <div class="field-wrap">
      <label class="field-label">Username</label>
      <input id="inp-user" type="text" class="field-input" placeholder="Enter username" autocomplete="username" />
    </div>
    <div class="field-wrap field-wrap-password">
      <label class="field-label">Password</label>
      <div class="password-input-wrap">
        <input id="inp-pass" type="password" class="field-input" placeholder="Enter password" autocomplete="current-password" />
        <button id="pwd-toggle" type="button" class="password-toggle" onclick="togglePasswordVisibility()" aria-label="Show password">👁</button>
      </div>
    </div>

    <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>

    <div class="login-hint">
      <strong>Demo accounts:</strong><br>
      registrar / reg123 &nbsp;|&nbsp; dean1 / dean123 &nbsp;|&nbsp; chair1 / chair123<br>
      fac1 / fac123 &nbsp;|&nbsp; Students: ID + birthday (mmddyyyy)
    </div>
  </div>
</div>

<!-- ── App Shell ─────────────────────── -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-brand">
       <span class="sidebar-brand-icon">🎓</span>
      <span class="sidebar-brand-text">SARM</span>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div id="sidebar-user-name" class="sidebar-user-name"></div>
      <div id="sidebar-user-role" class="sidebar-user-role"></div>
      <button class="btn btn-ghost btn-sm btn-full mt-8" onclick="doLogout()">Sign Out</button>
    </div>
  </aside>
  <main id="main">
    <div id="page-content"></div>
  </main>
</div>

<!-- Toast -->
<div id="toast-wrap"></div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
  <div id="modal-box" class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div id="modal-title" class="modal-title"></div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- Core -->
<script src="js/01_core/api.js"></script>
<script src="js/01_core/helpers.js"></script>
<script src="js/01_core/ui.js"></script>
<!-- Modules -->
<script src="js/02_user_management/auth.js"></script>
<script src="js/03_grade_management/faculty.js"></script>
<script src="js/04_chairman/chairman.js"></script>
<script src="js/05_dean/dean.js"></script>
<script src="js/06_registrar/registrar.js"></script>
<script src="js/07_student/student.js"></script>
<script src="js/08_analytics/analytics.js"></script>
<script src="js/09_archives/archives.js"></script>
</body>
</html>
